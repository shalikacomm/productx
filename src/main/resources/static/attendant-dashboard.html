<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Product | Attendant Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .status-card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .status-icon { font-size: 48px; margin-bottom: 12px; }
        .status-label { font-size: 13px; color: #888; margin-bottom: 6px; }
        .status-value { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .status-pending   { color: #e67e22; }
        .status-clocked-in { color: #27ae60; }
        .status-rejected  { color: #c0392b; }
        .status-completed { color: #2980b9; }
        .attendance-time { font-size: 14px; color: #555; margin-top: 4px; }
        .status-hint { margin-top: 8px; font-size: 13px; color: #aaa; }

        .clock-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 36px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .clock-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-clock-in  { background: #27ae60; color: #fff; }
        .btn-clock-out { background: #e67e22; color: #fff; }
        .btn-clock-in:hover:not(:disabled)  { background: #219150; }
        .btn-clock-out:hover:not(:disabled) { background: #cf6d17; }
    </style>
</head>
<body>

<div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <span class="brand-title">X-Product</span>
    <span class="topbar-user" id="topbarUser"></span>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="dashboard">
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <h2>X-Product</h2>
            <p id="branchLabel">Attendant Panel</p>
        </div>
        <nav>
            <a class="active" onclick="showSection('overview', this)">
                <span class="icon">&#9783;</span> Dashboard
            </a>
            <a onclick="showSection('history', this)">
                <span class="icon">&#128197;</span> My Attendance
            </a>
        </nav>
        <div class="user-info">
            <div class="name" id="sidebarName">-</div>
            <div class="role">Attendant</div>
        </div>
        <div class="logout-btn" onclick="logout()">&#8594; Logout</div>
    </aside>

    <main class="main">

        <!-- Overview -->
        <div class="section-page active" id="section-overview">
            <div class="page-header"><h2>Dashboard</h2></div>

            <!-- Session Status Card -->
            <div class="status-card">
                <div class="status-icon" id="statusIcon">&#9203;</div>
                <div class="status-label">Today's Attendance Status</div>
                <div class="status-value" id="statusValue">-</div>
                <div class="attendance-time" id="clockInDisplay"></div>
                <div class="attendance-time" id="clockOutDisplay"></div>
                <div class="status-hint" id="statusHint"></div>
                <div>
                    <button id="btnClockIn"  class="clock-btn btn-clock-in"  onclick="doClockIn()"  style="display:none">&#9654; Clock In</button>
                    <button id="btnClockOut" class="clock-btn btn-clock-out" onclick="doClockOut()" style="display:none">&#9632; Clock Out</button>
                </div>
            </div>

            <!-- Recent Attendance -->
            <div class="card">
                <div class="card-header"><h3>Recent Attendance</h3></div>
                <div class="card-body">
                    <div style="overflow-x:auto">
                    <table>
                        <thead><tr><th>Clock In</th><th>Clock Out</th><th>Status</th><th>Approved By</th></tr></thead>
                        <tbody id="recentBody">
                            <tr><td colspan="4" style="text-align:center;padding:20px;color:#999">Loading...</td></tr>
                        </tbody>
                    </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Full History -->
        <div class="section-page" id="section-history">
            <div class="page-header"><h2>My Attendance History</h2></div>
            <div class="card">
                <div class="card-body">
                    <div style="overflow-x:auto">
                    <table>
                        <thead><tr><th>Clock In</th><th>Clock Out</th><th>Status</th><th>Approved By</th><th>Approved At</th><th>Note</th></tr></thead>
                        <tbody id="historyBody">
                            <tr><td colspan="6" style="text-align:center;padding:20px;color:#999">Loading...</td></tr>
                        </tbody>
                    </table>
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>

<script src="/js/api.js"></script>
<script>
    const currentUser = getUser();
    if (!currentUser || currentUser.role !== 'ATTENDANT') window.location.href = '/login.html';
    document.getElementById('sidebarName').textContent = currentUser.fullName;
    document.getElementById('topbarUser').textContent  = currentUser.fullName;
    document.getElementById('branchLabel').textContent = currentUser.branchName || 'Attendant Panel';

    function fmtTime(dt) {
        return dt ? new Date(dt).toLocaleString() : '-';
    }

    function statusBadge(status) {
        const colors = {
            CLOCK_IN_PENDING:  'badge-attendant',
            CLOCKED_IN:        'badge-clerk',
            CLOCK_OUT_PENDING: 'badge-attendant',
            COMPLETED:         'badge-manager',
            REJECTED:          'badge-admin'
        };
        return `<span class="badge ${colors[status] || ''}">${status.replace(/_/g,' ')}</span>`;
    }

    function renderStatusCard(session) {
        const iconEl  = document.getElementById('statusIcon');
        const valueEl = document.getElementById('statusValue');
        const hintEl  = document.getElementById('statusHint');
        const ciEl    = document.getElementById('clockInDisplay');
        const coEl    = document.getElementById('clockOutDisplay');
        const btnIn   = document.getElementById('btnClockIn');
        const btnOut  = document.getElementById('btnClockOut');

        // Hide both buttons initially
        btnIn.style.display  = 'none';
        btnOut.style.display = 'none';
        valueEl.className = 'status-value';

        if (!session) {
            iconEl.innerHTML = '&#9675;';
            valueEl.textContent = 'Not Clocked In';
            hintEl.textContent  = 'Click Clock In when you start your shift.';
            ciEl.textContent = '';
            coEl.textContent = '';
            btnIn.style.display = 'inline-block';
            return;
        }

        ciEl.textContent = session.clockIn  ? 'Clock In:  ' + fmtTime(session.clockIn)  : '';
        coEl.textContent = session.clockOut ? 'Clock Out: ' + fmtTime(session.clockOut) : '';

        switch (session.status) {
            case 'CLOCK_IN_PENDING':
                iconEl.innerHTML = '&#9203;';
                valueEl.textContent = 'Awaiting Clock-In Approval';
                valueEl.classList.add('status-pending');
                hintEl.textContent  = 'Waiting for your branch manager to approve your clock-in.';
                break;
            case 'CLOCKED_IN':
                iconEl.innerHTML = '&#9989;';
                valueEl.textContent = 'Clocked In';
                valueEl.classList.add('status-clocked-in');
                hintEl.textContent  = 'You are clocked in. Click Clock Out when your shift ends.';
                btnOut.style.display = 'inline-block';
                break;
            case 'CLOCK_OUT_PENDING':
                iconEl.innerHTML = '&#9203;';
                valueEl.textContent = 'Awaiting Clock-Out Approval';
                valueEl.classList.add('status-pending');
                hintEl.textContent  = 'Waiting for your branch manager to approve your clock-out.';
                break;
            case 'COMPLETED':
                iconEl.innerHTML = '&#127881;';
                valueEl.textContent = 'Shift Completed';
                valueEl.classList.add('status-completed');
                hintEl.textContent  = 'Your shift has been recorded and completed.';
                break;
            case 'REJECTED':
                iconEl.innerHTML = '&#10060;';
                valueEl.textContent = 'Rejected';
                valueEl.classList.add('status-rejected');
                hintEl.innerHTML = 'Your request was rejected.'
                    + (session.rejectionNote ? ` <br><strong>Manager note:</strong> ${session.rejectionNote}` : ' Please contact your manager.');
                btnIn.style.display = 'inline-block';
                break;
        }
    }

    function renderRows(list, tbodyId, cols) {
        const tbody = document.getElementById(tbodyId);
        if (!list || list.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${cols}" style="text-align:center;padding:20px;color:#999">No records</td></tr>`;
            return;
        }
        tbody.innerHTML = list.map(a => `<tr>
            <td>${fmtTime(a.clockIn)}</td>
            <td>${fmtTime(a.clockOut)}</td>
            <td>${statusBadge(a.status)}</td>
            <td>${a.approvedByUsername || '-'}</td>
            ${cols >= 5 ? `<td>${a.approvedAt ? fmtTime(a.approvedAt) : '-'}</td>` : ''}
            ${cols === 6 ? `<td style="color:#c0392b;font-size:13px">${a.rejectionNote || ''}</td>` : ''}
        </tr>`).join('');
    }

    let currentSession = null;

    async function loadData() {
        try {
            const [session, list] = await Promise.all([getMyActiveSession(), getMyAttendance()]);
            currentSession = session;
            renderStatusCard(session);
            renderRows(list.slice(0, 5), 'recentBody', 4);
            renderRows(list, 'historyBody', 6);
        } catch(e) { console.error(e); }
    }

    async function doClockIn() {
        const btn = document.getElementById('btnClockIn');
        btn.disabled = true;
        try {
            await clockIn();
            await loadData();
        } catch(e) {
            alert(e.message);
            btn.disabled = false;
        }
    }

    async function doClockOut() {
        const btn = document.getElementById('btnClockOut');
        btn.disabled = true;
        try {
            await clockOut();
            await loadData();
        } catch(e) {
            alert(e.message);
            btn.disabled = false;
        }
    }

    function showSection(name, el) {
        document.querySelectorAll('.section-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        if (el) el.classList.add('active');
        closeSidebar();
        if (name === 'history') loadData();
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
    }

    // Initial load + poll every 30s
    loadData();
    setInterval(loadData, 30000);
</script>
</body>
</html>
