<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Product ERP | Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="logo">
            <h1>X-Product</h1>
            <p>Enterprise Resource Planning</p>
        </div>

        <div class="alert alert-error" id="loginError"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
        </form>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    // Redirect if already logged in
    const user = getUser();
    if (user) redirectByRole(user.role);

    function redirectByRole(role) {
        const routes = {
            ADMIN: '/admin-dashboard.html',
            MANAGER: '/manager-dashboard.html',
            CLERK: '/clerk-dashboard.html',
            ATTENDANT: '/attendant-dashboard.html'
        };
        window.location.href = routes[role] || '/login.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('loginError');
        errorEl.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const data = await login(
                document.getElementById('username').value.trim(),
                document.getElementById('password').value
            );
            redirectByRole(data.role);
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
</script>
</body>
</html>
