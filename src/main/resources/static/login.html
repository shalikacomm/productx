<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Product | Fuel Station ERP</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ---- Login page full override ---- */
        body { background: #0A0A0A; }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            padding: 0;
            background: none;
            position: relative;
            overflow: hidden;
        }

        /* ================================================
           LEFT PANEL — fuel station visual
           ================================================ */
        .login-visual {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(155deg, #0A0A0A 0%, #111111 40%, #1A0E00 100%);
            overflow: hidden;
            padding: 40px;
        }

        /* animated road lines at the bottom */
        .road {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 90px;
            background: #151515;
            border-top: 3px solid #2A2A2A;
        }

        .road-line {
            position: absolute;
            top: 38px;
            height: 14px;
            width: 60px;
            background: #FF7A00;
            border-radius: 3px;
            opacity: 0.7;
            animation: roadScroll 2.4s linear infinite;
        }

        .road-line:nth-child(1) { left: -60px; animation-delay: 0s; }
        .road-line:nth-child(2) { left: -60px; animation-delay: 0.8s; }
        .road-line:nth-child(3) { left: -60px; animation-delay: 1.6s; }

        @keyframes roadScroll {
            0%   { transform: translateX(0); opacity: 0; }
            10%  { opacity: 0.7; }
            90%  { opacity: 0.7; }
            100% { transform: translateX(calc(100vw + 60px)); opacity: 0; }
        }

        /* glow orb behind pump */
        .glow-orb {
            position: absolute;
            width: 340px; height: 340px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,122,0,0.18) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* ---- SVG Fuel Pump ---- */
        .pump-wrap {
            position: relative;
            z-index: 2;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 30px rgba(255,122,0,0.45));
            animation: pumpFloat 3.5s ease-in-out infinite;
        }

        @keyframes pumpFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        .login-visual .brand-name {
            position: relative;
            z-index: 2;
            font-size: 28px;
            font-weight: 900;
            color: #FF7A00;
            letter-spacing: 3px;
            text-transform: uppercase;
            line-height: 1;
            text-align: center;
        }

        .login-visual .brand-tagline {
            position: relative;
            z-index: 2;
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .login-visual .visual-stats {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 32px;
            margin-top: 44px;
        }

        .login-visual .v-stat {
            text-align: center;
        }

        .login-visual .v-stat .v-num {
            font-size: 26px;
            font-weight: 800;
            color: #FF7A00;
        }

        .login-visual .v-stat .v-label {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .login-visual .v-divider {
            width: 1px;
            background: rgba(255,122,0,0.2);
        }

        /* ================================================
           RIGHT PANEL — form
           ================================================ */
        .login-form-panel {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111111;
            border-left: 1px solid rgba(255,122,0,0.15);
            padding: 48px 40px;
        }

        .login-card {
            background: none;
            border: none;
            box-shadow: none;
            padding: 0;
            width: 100%;
            max-width: 100%;
        }

        .login-card .form-head {
            margin-bottom: 32px;
        }

        .login-card .form-head h2 {
            font-size: 26px;
            font-weight: 800;
            color: #F0F0F0;
            margin-bottom: 6px;
        }

        .login-card .form-head p {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
        }

        .login-card .form-group label {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .login-card .form-group input {
            background: #1C1C1C;
            border: 1.5px solid rgba(255,122,0,0.18);
            color: #F0F0F0;
            padding: 13px 16px;
            font-size: 15px;
            border-radius: 8px;
        }

        .login-card .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .login-card .form-group input:focus {
            border-color: #FF7A00;
            background: #202020;
            box-shadow: 0 0 0 3px rgba(255,122,0,0.14);
        }

        .login-card .btn-primary {
            background: linear-gradient(135deg, #FF7A00 0%, #FF9D00 100%);
            color: #000;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 1px;
            padding: 14px;
            border-radius: 8px;
            text-transform: uppercase;
            box-shadow: 0 4px 20px rgba(255,122,0,0.35);
            margin-top: 8px;
            transition: box-shadow 0.2s, opacity 0.2s;
        }

        .login-card .btn-primary:hover {
            opacity: 1;
            box-shadow: 0 6px 28px rgba(255,122,0,0.55);
        }

        .alert-error {
            background: rgba(239,68,68,0.12);
            color: #FCA5A5;
            border-color: rgba(239,68,68,0.4);
        }

        .login-card .form-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 0.5px;
        }

        /* ================================================
           MOBILE — stack vertically
           ================================================ */
        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; }

            .login-visual {
                flex: none;
                padding: 40px 24px 30px;
                min-height: 280px;
            }

            .login-visual .visual-stats { margin-top: 24px; }
            .login-visual .brand-name   { font-size: 32px; }
            .pump-wrap svg              { width: 100px; height: 150px; }

            .login-form-panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid rgba(255,122,0,0.15);
                padding: 36px 24px;
            }
        }

        @media (max-width: 480px) {
            .login-visual { min-height: 240px; padding: 30px 20px 24px; }
            .login-visual .brand-name { font-size: 28px; }
            .login-visual .visual-stats { gap: 20px; }
            .pump-wrap svg { width: 86px; height: 128px; }
            .road { height: 60px; }
            .login-form-panel { padding: 28px 20px; }
        }
    </style>
</head>
<body>
<div class="login-wrapper">

    <!-- LEFT: visual panel -->
    <div class="login-visual">
        <div class="glow-orb"></div>

        <!-- SVG Fuel Pump -->
        <div class="pump-wrap">
            <svg width="130" height="195" viewBox="0 0 130 195" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- pump body -->
                <rect x="20" y="40" width="72" height="120" rx="6" fill="#1E1E1E" stroke="#FF7A00" stroke-width="2"/>
                <!-- display screen -->
                <rect x="30" y="54" width="52" height="32" rx="4" fill="#0A2A0A" stroke="#22C55E" stroke-width="1.5"/>
                <!-- screen glow text -->
                <text x="56" y="66" text-anchor="middle" fill="#22C55E" font-size="8" font-family="monospace">LKR</text>
                <text x="56" y="80" text-anchor="middle" fill="#22C55E" font-size="11" font-weight="bold" font-family="monospace">000.00</text>
                <!-- price panel -->
                <rect x="30" y="96" width="52" height="24" rx="3" fill="#1A1A1A" stroke="#FF7A00" stroke-width="1"/>
                <text x="56" y="112" text-anchor="middle" fill="#FF7A00" font-size="9" font-family="monospace">OCTANE 92</text>
                <!-- keypad dots -->
                <circle cx="38" cy="132" r="4" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
                <circle cx="56" cy="132" r="4" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
                <circle cx="74" cy="132" r="4" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
                <circle cx="38" cy="146" r="4" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
                <circle cx="56" cy="146" r="4" fill="#FF7A00"/>
                <circle cx="74" cy="146" r="4" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
                <!-- base -->
                <rect x="14" y="158" width="84" height="12" rx="4" fill="#1A1A1A" stroke="#FF7A00" stroke-width="1.5"/>
                <rect x="10" y="168" width="92" height="8" rx="2" fill="#111"/>
                <!-- hose arm right -->
                <path d="M92 80 Q118 80 118 105 Q118 125 105 130" stroke="#FF7A00" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                <!-- nozzle -->
                <rect x="98" y="126" width="18" height="9" rx="4" fill="#FF7A00" transform="rotate(-20 98 130)"/>
                <!-- top cap -->
                <rect x="26" y="30" width="60" height="12" rx="4" fill="#222" stroke="#FF7A00" stroke-width="1.5"/>
                <rect x="40" y="22" width="32" height="10" rx="3" fill="#FF7A00"/>
                <text x="56" y="31" text-anchor="middle" fill="#000" font-size="7" font-weight="bold" font-family="sans-serif">FUEL</text>
            </svg>
        </div>

        <div class="brand-name">KASUN ENTERPRISES</div>
        <div class="brand-tagline">Fuel Station ERP</div>

        <div class="visual-stats">
            <div class="v-stat">
                <div class="v-num">24/7</div>
                <div class="v-label">Access</div>
            </div>
            <div class="v-divider"></div>
            <div class="v-stat">
                <div class="v-num">LK</div>
                <div class="v-label">Sri Lanka</div>
            </div>
        </div>

        <div class="road">
            <div class="road-line"></div>
            <div class="road-line"></div>
            <div class="road-line"></div>
        </div>
    </div>

    <!-- RIGHT: login form -->
    <div class="login-form-panel">
        <div class="login-card">
            <div class="form-head">
                <h2>Welcome back</h2>
                <p>Sign in to your station account</p>
            </div>

            <div class="alert alert-error" id="loginError"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
            </form>

            <div class="form-footer">X-Product &copy; 2025 &mdash; Sri Lanka</div>
        </div>
    </div>

</div>

<script src="/js/api.js"></script>
<script>
    const user = getUser();
    if (user) redirectByRole(user.role);

    function redirectByRole(role) {
        const routes = {
            ADMIN:     '/admin-dashboard.html',
            MANAGER:   '/manager-dashboard.html',
            CLERK:     '/clerk-dashboard.html',
            ATTENDANT: '/attendant-dashboard.html'
        };
        window.location.href = routes[role] || '/login.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errorEl = document.getElementById('loginError');
        errorEl.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const data = await login(
                document.getElementById('username').value.trim(),
                document.getElementById('password').value
            );
            redirectByRole(data.role);
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
</script>
</body>
</html>
