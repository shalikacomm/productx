<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Product | Manager Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Mobile Topbar -->
<div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
    <span class="brand-title">X-Product</span>
    <span class="topbar-user" id="topbarUser"></span>
</div>

<!-- Sidebar Backdrop (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="dashboard">
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <h2>X-Product</h2>
            <p id="branchLabel">Manager Panel</p>
        </div>
        <nav>
            <a class="active" onclick="showSection('overview', this)">
                <span class="icon">&#9783;</span> Overview
            </a>
            <a onclick="showSection('attendants', this)">
                <span class="icon">&#128110;</span> Attendants
            </a>
        </nav>
        <div class="user-info">
            <div class="name" id="sidebarName">-</div>
            <div class="role">Branch Manager</div>
        </div>
        <div class="logout-btn" onclick="logout()">&#8594; Logout</div>
    </aside>

    <main class="main">

        <!-- Overview -->
        <div class="section-page active" id="section-overview">
            <div class="page-header">
                <h2>Overview</h2>
                <button class="btn btn-primary" onclick="openCreateModal()">+ Add Attendant</button>
            </div>
            <div class="stats-row">
                <div class="stat-card">
                    <div class="icon icon-orange">&#128110;</div>
                    <div class="info">
                        <div class="value" id="stat-attendants">0</div>
                        <div class="label">My Attendants</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <h3>Attendants</h3>
                    <button class="btn btn-primary" onclick="openCreateModal()">+ Add Attendant</button>
                </div>
                <div class="card-body">
                    <table>
                        <thead>
                            <tr><th>#</th><th>Full Name</th><th>Username</th><th>Phone</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="overviewAttendantsBody">
                            <tr><td colspan="5" style="text-align:center;padding:20px;color:#999">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Attendants Section -->
        <div class="section-page" id="section-attendants">
            <div class="page-header">
                <h2>Attendants</h2>
                <button class="btn btn-primary" onclick="openCreateModal()">+ Add Attendant</button>
            </div>
            <div class="card">
                <div class="card-body">
                    <table>
                        <thead>
                            <tr><th>#</th><th>Full Name</th><th>Username</th><th>Phone</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="attendantsBody">
                            <tr><td colspan="5" style="text-align:center;padding:20px;color:#999">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- Create Attendant Modal -->
<div class="modal-overlay" id="createModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Add Attendant</h3>
            <button class="modal-close" onclick="closeCreateModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="alert alert-error" id="createError"></div>
            <div class="alert alert-success" id="createSuccess"></div>
            <form id="createForm" onsubmit="return false">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="cu-fullName" placeholder="Enter full name">
                    <span class="field-error" id="cu-fullName-error"></span>
                </div>
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="cu-username" placeholder="Enter username (3–50 characters)">
                    <span class="field-error" id="cu-username-error"></span>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="cu-password" placeholder="Min 6 characters">
                    <span class="field-error" id="cu-password-error"></span>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="cu-email" placeholder="Optional">
                    <span class="field-error" id="cu-email-error"></span>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="cu-phone" placeholder="Optional">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
            <button class="btn btn-primary" onclick="submitCreate()">Add Attendant</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
    const currentUser = getUser();
    if (!currentUser || currentUser.role !== 'MANAGER') {
        window.location.href = '/login.html';
    }
    document.getElementById('sidebarName').textContent = currentUser.fullName;
    document.getElementById('topbarUser').textContent  = currentUser.fullName;
    document.getElementById('branchLabel').textContent = currentUser.branchName || 'Manager Panel';

    let attendants = [];

    async function init() {
        try {
            const all = await getUsersByRole('ATTENDANT');
            attendants = all.filter(a => a.branchId === currentUser.branchId);
            renderAttendants();
        } catch (e) { console.error(e); }
    }

    function renderAttendants() {
        document.getElementById('stat-attendants').textContent = attendants.length;
        const rows = attendants.length === 0
            ? '<tr><td colspan="5" style="text-align:center;padding:20px;color:#999">No attendants yet</td></tr>'
            : attendants.map((a, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${a.fullName}</td>
                    <td>${a.username}</td>
                    <td>${a.phone || '-'}</td>
                    <td><button class="btn btn-danger" style="padding:5px 12px;font-size:12px" onclick="deactivate(${a.id})">Deactivate</button></td>
                </tr>`).join('');
        document.getElementById('overviewAttendantsBody').innerHTML = rows;
        document.getElementById('attendantsBody').innerHTML = rows;
    }

    function showSection(name, el) {
        document.querySelectorAll('.section-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        if (el) el.classList.add('active');
        closeSidebar();
    }

    const MGR_FIELDS = ['cu-fullName', 'cu-username', 'cu-password', 'cu-email'];

    function openCreateModal() {
        document.getElementById('createModal').classList.add('active');
        document.getElementById('createForm').reset();
        document.getElementById('createError').classList.remove('show');
        document.getElementById('createSuccess').classList.remove('show');
        clearAllFields(MGR_FIELDS);
    }

    function closeCreateModal() {
        document.getElementById('createModal').classList.remove('active');
        clearAllFields(MGR_FIELDS);
    }

    async function submitCreate() {
        const errorEl   = document.getElementById('createError');
        const successEl = document.getElementById('createSuccess');
        errorEl.classList.remove('show');
        successEl.classList.remove('show');

        // Client-side validation (no role/branch selects on this form)
        if (!validateUserForm(false)) return;

        const payload = {
            role:     'ATTENDANT',
            branchId: currentUser.branchId,
            fullName: document.getElementById('cu-fullName').value.trim(),
            username: document.getElementById('cu-username').value.trim(),
            password: document.getElementById('cu-password').value,
            email:    document.getElementById('cu-email').value.trim() || null,
            phone:    document.getElementById('cu-phone').value.trim() || null,
        };

        try {
            await createUser(payload);
            successEl.textContent = 'Attendant added successfully!';
            successEl.classList.add('show');
            document.getElementById('createForm').reset();
            clearAllFields(MGR_FIELDS);
            const all = await getUsersByRole('ATTENDANT');
            attendants = all.filter(a => a.branchId === currentUser.branchId);
            renderAttendants();
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.classList.add('show');
        }
    }

    async function deactivate(id) {
        if (!confirm('Deactivate this attendant?')) return;
        try {
            await deactivateUser(id);
            const all = await getUsersByRole('ATTENDANT');
            attendants = all.filter(a => a.branchId === currentUser.branchId);
            renderAttendants();
        } catch (err) { alert(err.message); }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
    }

    init();
</script>
</body>
</html>
